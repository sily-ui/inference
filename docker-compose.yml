version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: inference-backend
    network_mode: host
    volumes:
      - ./backend/uploads:/app/uploads
      - ./.env:/app/.env:ro
    environment:
      - FLASK_DEBUG=False
      - FLASK_PORT=5000
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: inference-frontend
    network_mode: host
    restart: unless-stopped